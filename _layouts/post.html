---
layout: base
---
<style>
  .post-head{max-width:720px;margin:0 auto;padding:64px 24px 0;}
  .post-meta{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.04em;color:var(--faint);margin-bottom:16px;display:flex;gap:14px;flex-wrap:wrap;}
  .post-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:40px;line-height:1.08;letter-spacing:-0.02em;margin:0 0 10px;color:var(--text);}
  .post-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:18px;}
  .post-tags span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);border:1px solid var(--border);border-radius:100px;padding:5px 12px;}

  .post-body{max-width:720px;margin:0 auto;padding:36px 24px 0;font-size:18px;line-height:1.72;color:var(--text);}
  .post-body > * + *{margin-top:1.25em;}
  .post-body h2{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:26px;letter-spacing:-0.015em;margin-top:2em;line-height:1.2;}
  .post-body h3{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;margin-top:1.6em;}
  .post-body p, .post-body li{color:var(--muted);}
  .post-body strong{color:var(--text);font-weight:600;}
  .post-body a{color:var(--accent);text-decoration:underline;text-underline-offset:2px;}
  .post-body ul, .post-body ol{padding-left:22px;}
  .post-body li + li{margin-top:.4em;}
  .post-body blockquote{margin:1.5em 0;padding:6px 20px;border-left:3px solid #C26B4A;color:var(--muted);font-style:italic;}
  .post-body img{max-width:100%;height:auto;border-radius:14px;border:1px solid var(--border);}
  .post-body code{font-family:'JetBrains Mono',monospace;font-size:0.86em;background:var(--code-bg);padding:2px 6px;border-radius:6px;}
  .post-body pre{background:var(--code-bg);border:1px solid var(--border);border-radius:12px;padding:18px;overflow-x:auto;}
  .post-body pre code{background:none;padding:0;}
  .post-body hr{border:none;border-top:1px solid var(--border);margin:2.5em 0;}

  .post-foot{max-width:720px;margin:0 auto;padding:48px 24px 0;}
  .post-foot a{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);}
</style>

<article>
  <div class="post-head">
    <div class="post-meta">
      <span>{{ page.date | date: "%B %-d, %Y" }}</span>
      {% if page.read %}<span>{{ page.read }}</span>{% endif %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.tags.size > 0 %}
    <div class="post-tags">
      {% for tag in page.tags %}<span>{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
  </div>

  <div class="post-body">
    {{ content }}
  </div>

  <div class="post-foot">
    <a href="/blog/">← All writing</a>
  </div>
</article>
