  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ata-open=\"{{ menuOpenStr }}\" style=\"position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:99;width:min(1100px,calc(100% - 30px));display:flex;flex-direction:column;gap:2px;background:rgba(247,243,236,0.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(38,33,28,0.08);border-top:none;border-radius:0 0 24px 24px;box-shadow:0 24px 42px -20px rgba(38,33,28,0.4);padding:20px 12px 12px;max-height:0;opacity:0;overflow:hidden;pointer-events:none;transition:max-height .45s cubic-bezier(.4,0,.2,1),opacity .34s ease;\">\n  <sc-for list=\"{{ menuItems }}\" as=\"m\" hint-placeholder-count=\"5\">\n    <span onclick=\"{{ m.onClick }}\" style=\"font-family:'Hanken Grotesk',sans-serif;font-size:16px;font-weight:600;color: {{ m.col }};padding:13px 16px;border-radius:12px;cursor:pointer;\" style-hover=\"background:#26211c0a;\">{{ m.label }}<\u002Fspan>\n  <\u002Fsc-for>\n<\u002Fdiv>\n\n<!-- ============ CONTENT ============ -->\n<main style=\"position:relative;z-index:1;\">\n\n  <!-- ===== HOME ===== -->\n  <section id=\"home\" class=\"sec sec-home reveal-sec\" data-screen-label=\"Home\" style=\"max-width:1000px;margin:0 auto;padding:158px 40px 96px;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:46px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;letter-spacing:0.04em;\">001 / INTRODUCTION<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#A99E8E;\">2026<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:inline-flex;align-items:center;gap:9px;margin-bottom:26px;\">\n      <span style=\"width:8px;height:8px;border-radius:50%;background:#C26B4A;\"><\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.05em;color:#9E4B2E;\">CURRENTLY / CONSULTING INTERN @ DELOITTE<\u002Fspan>\n    <\u002Fdiv>\n\n    <h1 class=\"big\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:58px;line-height:1.04;letter-spacing:-0.025em;margin:0 0 26px;max-width:760px;\">A business brain that<br>{{ typeWord }}<\u002Fh1>\n    <p style=\"font-size:19px;line-height:1.6;color:#5F564C;max-width:560px;margin:0 0 40px;\">I'm Marcus, a Schulich business student with roots in finance, audit, and consulting. Now I'm channeling that rigor into products of my own, on the path to product management.<\u002Fp>\n\n    <div style=\"display:flex;gap:14px;margin-bottom:72px;flex-wrap:wrap;\">\n      <button onclick=\"{{ goExperience }}\" style=\"font-family:'Hanken Grotesk',sans-serif;padding:13px 26px;background:#26211C;color:#F7F3EC;border:none;border-radius:100px;font-size:15px;font-weight:600;cursor:pointer;\" style-hover=\"background:#3a322a;\">View experience<\u002Fbutton>\n      <button onclick=\"{{ goContact }}\" style=\"font-family:'Hanken Grotesk',sans-serif;padding:13px 26px;background:transparent;color:#26211C;border:1px solid #2621242a;border-radius:100px;font-size:15px;font-weight:600;cursor:pointer;\" style-hover=\"border-color:#262124;\">Get in touch<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;margin-bottom:20px;letter-spacing:0.04em;\">RECENT / SELECTED ROLES<\u002Fdiv>\n    <div style=\"border-top:1px solid #2621241a;\">\n      <sc-for list=\"{{ recent }}\" as=\"job\" hint-placeholder-count=\"3\">\n        <div onclick=\"{{ goExperience }}\" class=\"recent-row\" style=\"display:grid;grid-template-columns:160px 1fr auto;gap:22px;padding:20px 8px;border-bottom:1px solid #26212412;align-items:center;cursor:pointer;border-radius:8px;transition:background .2s;\" style-hover=\"background:#EDE6D8;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#A99E8E;\">{{ job.year }}<\u002Fspan>\n          <span style=\"font-size:16.5px;font-weight:600;color:#26211C;\">{{ job.role }}<\u002Fspan>\n          <span style=\"font-size:14px;color:#9E4B2E;font-weight:500;\">{{ job.company }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div aria-hidden=\"true\" style=\"max-width:1000px;margin:0 auto;padding:0 40px;\"><div style=\"height:1px;background:linear-gradient(90deg,transparent,#26211c24 18%,#26211c24 82%,transparent);\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- ===== ABOUT ===== -->\n  <section id=\"about\" class=\"sec reveal-sec\" data-screen-label=\"About\" style=\"max-width:1000px;margin:0 auto;padding:96px 40px;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:46px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;letter-spacing:0.04em;\">002 / ABOUT<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#A99E8E;\">Toronto, ON<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"about-grid\" style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:48px;align-items:stretch;margin-bottom:64px;\">\n      <div style=\"display:flex;flex-direction:column;gap:30px;\">\n        <div>\n        <h1 class=\"big\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:42px;line-height:1.08;letter-spacing:-0.02em;margin:0 0 26px;\">A few things about me.<\u002Fh1>\n        <p style=\"font-size:17px;line-height:1.68;color:#5F564C;margin:0 0 18px;\">I was born in the <strong style=\"color:#26211C;font-weight:600;\">Philippines<\u002Fstrong>, where I grew up in my great-grandparents' house, always surrounded by family. Living that close to so many people taught me the value of community early, and it has shaped how I treat everyone I work with.<\u002Fp>\n        <p style=\"font-size:17px;line-height:1.68;color:#5F564C;margin:0;\">When I was five, my family moved to <strong style=\"color:#26211C;font-weight:600;\">Canada<\u002Fstrong>. It was a culture shock, but instead of resisting it I embraced the diversity and the change around me. That openness became my approach to life: stay curious, say yes, and figure it out as I go.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"move-grid\" style=\"background:linear-gradient(135deg,#FBF1E7,#F6ECDF);border:1px solid #2621241a;border-radius:20px;padding:30px 32px;display:flex;flex-direction:column;gap:16px;flex:1;justify-content:center;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;letter-spacing:0.04em;\">HOW I MOVE<\u002Fdiv>\n          <p style=\"font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:23px;line-height:1.32;letter-spacing:-0.015em;color:#26211C;margin:0;\">I never turn down an opportunity I have the chance to take. If I try it and love it, I stick with it. If I don't, I move on to the next one.<\u002Fp>\n          <p style=\"font-size:15px;line-height:1.66;color:#5F564C;margin:0;\">That mindset is the thread running through everything I've done, from a summer at an immigration law firm to audit and finance, and now consulting on Deloitte's Finance Transformation team while I finish my degree at the <strong style=\"color:#26211C;font-weight:600;\">Schulich School of Business<\u002Fstrong>. Each step was a door worth walking through. The opportunity I'm chasing now is <strong style=\"color:#26211C;font-weight:600;\">product management<\u002Fstrong>, where my curiosity about people, business, and building all meet.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"headshot\" style=\"height:100%;border-radius:16px;overflow:hidden;border:1px solid #2621241a;background:#EDE6D8;\">\n        <img src=\"48d8385a-6819-4d1a-a6ed-8e735b543517\" alt=\"Marcus Maximus\" style=\"width:100%;height:100%;object-fit:cover;object-position:50% 20%;display:block;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;margin-bottom:22px;letter-spacing:0.04em;\">BEYOND WORK<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;\">\n      <sc-for list=\"{{ hobbies }}\" as=\"h\" hint-placeholder-count=\"5\">\n        <div style=\"background:#FFFFFF;border:1px solid #2621241a;border-radius:14px;padding:20px 18px;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;margin-bottom:6px;\">{{ h.name }}<\u002Fdiv>\n          <div style=\"font-size:13.5px;line-height:1.5;color:#7C7368;\">{{ h.note }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div aria-hidden=\"true\" style=\"max-width:1000px;margin:0 auto;padding:0 40px;\"><div style=\"height:1px;background:linear-gradient(90deg,transparent,#26211c24 18%,#26211c24 82%,transparent);\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- ===== EXPERIENCE ===== -->\n  <section id=\"experience\" class=\"sec reveal-sec\" data-screen-label=\"Experience\" style=\"max-width:1000px;margin:0 auto;padding:96px 40px;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:46px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;letter-spacing:0.04em;\">003 / EXPERIENCE<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#A99E8E;\">2022 to Present<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"big\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:42px;line-height:1.08;letter-spacing:-0.02em;margin:0 0 48px;\">Where I've worked.<\u002Fh1>\n\n    <div>\n      <sc-for list=\"{{ experiences }}\" as=\"job\" hint-placeholder-count=\"4\">\n        <div class=\"exp-row\" style=\"display:grid;grid-template-columns:172px 1fr;gap:32px;padding:30px 0;border-top:1px solid #2621241a;\">\n          <div>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#26211C;font-weight:500;\">{{ job.year }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#A99E8E;margin-top:4px;\">{{ job.type }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:8px;\">\n              <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:22px;letter-spacing:-0.01em;\">{{ job.role }}<\u002Fspan>\n              <span style=\"font-size:15px;color:#9E4B2E;font-weight:500;\">{{ job.company }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-size:15.5px;line-height:1.6;color:#5F564C;margin:0;max-width:560px;\">{{ job.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div class=\"exp-edu-grid\" style=\"margin-top:56px;display:grid;grid-template-columns:1fr 1fr;gap:40px;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;margin-bottom:18px;letter-spacing:0.04em;\">EDUCATION<\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;margin-bottom:4px;\">Schulich School of Business<\u002Fdiv>\n        <div style=\"font-size:14.5px;color:#5F564C;\">York University · BBA<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#A99E8E;margin-top:6px;\">Expected 2027<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;margin-bottom:18px;letter-spacing:0.04em;\">SKILLS &amp; TOOLS<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:18px;\">\n          <sc-for list=\"{{ skillGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n            <div>\n              <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:#26211C;margin-bottom:10px;\">{{ g.label }}<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n                <sc-for list=\"{{ g.items }}\" as=\"s\" hint-placeholder-count=\"3\">\n                  <span style=\"font-size:13.5px;color:#26211C;background:#FFFFFF;border:1px solid #2621241f;border-radius:100px;padding:7px 15px;\">{{ s }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div aria-hidden=\"true\" style=\"max-width:1000px;margin:0 auto;padding:0 40px;\"><div style=\"height:1px;background:linear-gradient(90deg,transparent,#26211c24 18%,#26211c24 82%,transparent);\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- ===== PROJECTS ===== -->\n  <section id=\"projects\" class=\"sec reveal-sec\" data-screen-label=\"Projects\" style=\"max-width:1000px;margin:0 auto;padding:96px 40px;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:46px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;letter-spacing:0.04em;\">004 / PROJECTS<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#A99E8E;\">Selected work<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"big\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:42px;line-height:1.08;letter-spacing:-0.02em;margin:0 0 14px;\">Things I've helped build.<\u002Fh1>\n    <p style=\"font-size:17px;line-height:1.6;color:#5F564C;max-width:560px;margin:0 0 48px;\">A few projects where I've turned ambiguity into a clear answer: sizing markets, shaping strategy, and finding the story inside the data.<\u002Fp>\n\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;margin-bottom:20px;letter-spacing:0.04em;\">180 DEGREES CONSULTING / PRO-BONO STRATEGY<\u002Fdiv>\n    <div style=\"margin-bottom:56px;\">\n      <sc-for list=\"{{ projects }}\" as=\"p\" hint-placeholder-count=\"2\">\n        <div class=\"proj-card\" style=\"background:#FFFFFF;border:1px solid #2621241a;border-radius:20px;padding:34px 36px;margin-bottom:18px;\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:14px;flex-wrap:wrap;\">\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:26px;letter-spacing:-0.015em;color:#26211C;white-space:nowrap;\">{{ p.name }}<\u002Fdiv>\n            <div style=\"text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;\">\n              <div style=\"color:#9E4B2E;\">{{ p.role }}<\u002Fdiv>\n              <div style=\"color:#A99E8E;\">{{ p.period }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.55;color:#9E4B2E;margin:0 0 16px;max-width:640px;\">{{ p.context }}<\u002Fp>\n          <p style=\"font-size:15.5px;line-height:1.65;color:#5F564C;margin:0;max-width:640px;\">{{ p.body }}<\u002Fp>\n          <div style=\"display:flex;gap:38px;flex-wrap:wrap;padding:22px 0;border-top:1px solid #2621241a;border-bottom:1px solid #2621241a;margin:22px 0;\">\n            <sc-for list=\"{{ p.stats }}\" as=\"s\" hint-placeholder-count=\"2\">\n              <div>\n                <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;color:#C26B4A;letter-spacing:-0.01em;\">{{ s.v }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#7C7368;max-width:190px;line-height:1.4;margin-top:5px;\">{{ s.l }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n            <sc-for list=\"{{ p.tags }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5F564C;background:#F2ECE1;border-radius:100px;padding:6px 13px;\">{{ t }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;margin-bottom:20px;letter-spacing:0.04em;\">PERSONAL PROJECTS<\u002Fdiv>\n    <div class=\"proj-card\" style=\"background:#26211C;color:#EDE6D8;border-radius:20px;padding:34px 36px;\">\n      <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:14px;flex-wrap:wrap;\">\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:26px;letter-spacing:-0.015em;color:#F7F3EC;\">Melodi<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.05em;color:#26211C;background:#D9A88F;border-radius:100px;padding:5px 12px;\">COMING SOON<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:20px;line-height:1.4;color:#F7F3EC;margin:0 0 10px;max-width:560px;letter-spacing:-0.01em;\">A social app where your music taste is your identity.<\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.65;color:#B8AC9C;margin:0 0 22px;max-width:560px;\">Rank the songs you love and build a living portrait of how you hear the world. Currently in the works: a 0→1 product I'm designing and building from scratch.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#EDE6D8;background:#ffffff14;border:1px solid #ffffff1f;border-radius:100px;padding:6px 13px;\">Product<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#EDE6D8;background:#ffffff14;border:1px solid #ffffff1f;border-radius:100px;padding:6px 13px;\">Mobile<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#EDE6D8;background:#ffffff14;border:1px solid #ffffff1f;border-radius:100px;padding:6px 13px;\">0 → 1<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div aria-hidden=\"true\" style=\"max-width:1000px;margin:0 auto;padding:0 40px;\"><div style=\"height:1px;background:linear-gradient(90deg,transparent,#26211c24 18%,#26211c24 82%,transparent);\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- ===== CONTACT ===== -->\n  <section id=\"contact\" class=\"sec reveal-sec\" data-screen-label=\"Contact\" style=\"max-width:1040px;margin:0 auto;padding:96px 40px 70px;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:46px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#9E4B2E;letter-spacing:0.04em;\">005 / CONTACT<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#A99E8E;\">Let's talk<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"big\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:52px;line-height:1.04;letter-spacing:-0.025em;margin:0 0 22px;max-width:640px;\">Let's build something together.<\u002Fh1>\n    <p style=\"font-size:18px;line-height:1.6;color:#5F564C;max-width:520px;margin:0 0 48px;\">I'm always happy to chat about product, finance, or where the two meet, and I'm actively looking for product management opportunities for 2027.<\u002Fp>\n\n    <div class=\"contact-grid\" style=\"background:#FFFFFF;border:1px solid #2621241a;border-radius:22px;box-shadow:0 18px 40px -28px rgba(38,33,28,0.4);padding:38px 40px 34px;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.06em;color:#9E4B2E;text-transform:uppercase;margin-bottom:10px;\">Drop me a line<\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:27px;letter-spacing:-0.015em;color:#26211C;margin:0;\">Send me a message!<\u002Fh2>\n\n        <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ submitMsg }}\" style=\"display:flex;flex-direction:column;gap:16px;margin-top:24px;\">\n            <div class=\"field-row\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div>\n              <label style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.06em;color:#9A8F80;text-transform:uppercase;display:block;margin-bottom:7px;\">Name<\u002Flabel>\n              <input ref=\"{{ nameRef }}\" type=\"text\" placeholder=\"Your name\" style=\"width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #2621241f;border-radius:10px;background:#FBF9F4;font-family:'Hanken Grotesk',sans-serif;font-size:15px;color:#26211C;outline:none;transition:border-color .2s,background .2s;\" style-focus=\"border-color:#C26B4A;background:#FFFFFF;\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.06em;color:#9A8F80;text-transform:uppercase;display:block;margin-bottom:7px;\">Email<\u002Flabel>\n              <input ref=\"{{ emailRef }}\" type=\"email\" placeholder=\"you@email.com\" style=\"width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #2621241f;border-radius:10px;background:#FBF9F4;font-family:'Hanken Grotesk',sans-serif;font-size:15px;color:#26211C;outline:none;transition:border-color .2s,background .2s;\" style-focus=\"border-color:#C26B4A;background:#FFFFFF;\">\n            <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <label style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.06em;color:#9A8F80;text-transform:uppercase;display:block;margin-bottom:7px;\">Message<\u002Flabel>\n              <textarea ref=\"{{ msgRef }}\" rows=\"5\" placeholder=\"What's on your mind?\" style=\"width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #2621241f;border-radius:10px;background:#FBF9F4;font-family:'Hanken Grotesk',sans-serif;font-size:15px;color:#26211C;outline:none;resize:vertical;min-height:120px;line-height:1.5;transition:border-color .2s,background .2s;\" style-focus=\"border-color:#C26B4A;background:#FFFFFF;\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <button type=\"submit\" style=\"align-self:flex-start;font-family:'Hanken Grotesk',sans-serif;padding:13px 26px;background:#26211C;color:#F7F3EC;border:none;border-radius:100px;font-size:15px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:9px;transition:background .2s;\" style-hover=\"background:#3a322a;\">Send message <span style=\"font-size:16px;\">→<\u002Fspan><\u002Fbutton>\n          <\u002Fform>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:24px;padding:28px 24px;background:#FBF9F4;border:1px solid #2621241a;border-radius:14px;text-align:center;\">\n            <div style=\"width:46px;height:46px;border-radius:50%;background:#C26B4A;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F7F3EC\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;color:#26211C;margin-bottom:6px;\">Your email app should open.<\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.55;color:#7C7368;margin:0 0 18px;\">If it didn't, reach me directly at <span style=\"color:#9E4B2E;\">marcusreyes1027@gmail.com<\u002Fspan>.<\u002Fp>\n            <button onclick=\"{{ resetMsg }}\" style=\"font-family:'Hanken Grotesk',sans-serif;padding:10px 20px;background:transparent;color:#26211C;border:1px solid #2621242a;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;\" style-hover=\"border-color:#262124;\">Send another<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002F content:center;color:#9E4B2E;\">\n              <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M4.98 3.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-1 1.83-2.05 3.77-2.05 4.03 0 4.78 2.65 4.78 6.1V21h-4v-5.4c0-1.3-.02-2.96-1.8-2.96-1.8 0-2.08 1.4-2.08 2.86V21H9z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n            <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:#26211C;\">LinkedIn<\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://github.com/marcus-maximus27\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;background:#FFFFFF;border:1px solid #2621241a;border-radius:16px;padding:22px 14px;display:flex;flex-direction:column;align-items:center;gap:12px;transition:border-color .2s,transform .2s,box-shadow .2s;\" style-hover=\"border-color:#C26B4A;transform:translateY(-3px);box-shadow:0 14px 26px -16px rgba(38,33,28,0.4);\">\n            <span style=\"width:48px;height:48px;border-radius:50%;background:#F2ECE1;display:flex;align-items:center;justify-content:center;color:#9E4B2E;\">\n              <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58 0-.29-.01-1.06-.02-2.08-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.34-5.47-5.95 0-1.31.47-2.39 1.24-3.23-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.92 1.24 3.23 0 4.62-2.81 5.64-5.49 5.94.43.37.81 1.1.81 2.22 0 1.61-.01 2.9-.01 3.29 0 .32.21.7.82.58A12.01 12.01 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n            <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:#26211C;\">GitHub<\u002Fspan>\n          <\u002Fa>\n          <a href=\"#\" style=\"text-decoration:none;background:#FFFFFF;border:1px solid #2621241a;border-radius:16px;padding:22px 14px;display:flex;flex-direction:column;align-items:center;gap:12px;transition:border-color .2s,transform .2s,box-shadow .2s;\" style-hover=\"border-color:#C26B4A;transform:translateY(-3px);box-shadow:0 14px 26px -16px rgba(38,33,28,0.4);\">\n            <span style=\"width:48px;height:48px;border-radius:50%;background:#F2ECE1;display:flex;align-items:center;justify-content:center;color:#9E4B2E;\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 3v4a1 1 0 0 0 1 1h4\"><\u002Fpath><path d=\"M5 3h9l5 5v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z\"><\u002Fpath><path d=\"M8 13h8M8 17h6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n            <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:#26211C;\">Resume<\u002Fspan>\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- footer -->\n  <footer style=\"max-width:1040px;margin:0 auto;padding:24px 40px 56px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;border-top:1px solid #2621241a;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#A99E8E;\">© 2026 Marcus Maximus · Built in Toronto<\u002Fdiv>\n    <div style=\"display:flex;gap:10px;\">\n      <a href=\"https://www.linkedin.com/in/marcusreyes/\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;text-decoration:none;color:#5F564C;border:1px solid #2621241f;border-radius:100px;padding:7px 14px;\" style-hover=\"border-color:#C26B4A;\">LinkedIn<\u002Fa>\n      <a href=\"mailto:marcusreyes1027@gmail.com\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;text-decoration:none;color:#5F564C;border:1px solid #2621241f;border-radius:100px;padding:7px 14px;\" style-hover=\"border-color:#C26B4A;\">Email<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fmain>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { typed: '', menuOpen: false, sent: false, active: 'home' };\n\n  goSection(id){\n    var el = document.getElementById(id);\n    if(el){\n      var y = el.getBoundingClientRect().top + window.scrollY - 92;\n      window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });\n    }\n    if(this.state.menuOpen){ this.setState({ menuOpen: false }); }\n  }\n  toggleMenu(){ this.setState(s => ({ menuOpen: !s.menuOpen })); }\n  closeMenu(){ this.setState({ menuOpen: false }); }\n\n  submitMsg(e){\n    if(e && e.preventDefault) e.preventDefault();\n    const name = this._nameEl ? this._nameEl.value.trim() : '';\n    const email = this._emailEl ? this._emailEl.value.trim() : '';\n    const msg = this._msgEl ? this._msgEl.value.trim() : '';\n    const subject = encodeURIComponent(name ? ('Website message from ' + name) : 'Hello from your website');\n    const lines = [];\n    if(msg) lines.push(msg);\n    lines.push('');\n    if(name) lines.push('\\u2014 ' + name);\n    if(email) lines.push(email);\n    window.location.href = 'mailto:marcusreyes1027@gmail.com?subject=' + subject + '&body=' + encodeURIComponent(lines.join('\\n'));\n    this.setState({ sent: true });\n  }\n  resetMsg(){ this.setState({ sent: false }); }\n\n  componentDidMount(){\n    this._words = ['builds', 'ships', 'innovates'];\n    this._wi = 0; this._ci = 0; this._del = false;\n    this.typeLoop();\n\n    var self = this;\n    var secs = Array.prototype.slice.call(document.querySelectorAll('.reveal-sec'));\n    this._sections = secs.map(function(el){ return { id: el.id, el: el }; });\n\n    this._onScroll = function(){\n      if(self._raf) return;\n      self._raf = requestAnimationFrame(function(){\n        self._raf = null;\n        if(!self._sections || !self._sections.length) return;\n        var pos = window.scrollY + 140;\n        var active = self._sections[0].id;\n        for(var i = 0; i < self._sections.length; i++){\n          if(self._sections[i].el.offsetTop <= pos){ active = self._sections[i].id; }\n        }\n        if(active !== self.state.active){ self.setState({ active: active }); }\n      });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('resize', this._onScroll, { passive: true });\n    this._onScroll();\n\n    if('IntersectionObserver' in window){\n      secs.forEach(function(el){\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(44px)';\n        el.style.transition = 'opacity .85s cubic-bezier(.22,.61,.36,1), transform .85s cubic-bezier(.22,.61,.36,1)';\n        el.style.willChange = 'opacity, transform';\n      });\n      var io = new IntersectionObserver(function(entries){\n        entries.forEach(function(en){\n          if(en.isIntersecting){\n            en.target.style.opacity = '1';\n            en.target.style.transform = 'none';\n          } else {\n            en.target.style.opacity = '0';\n            en.target.style.transform = 'translateY(44px)';\n          }\n        });\n      }, { threshold: 0.12 });\n      secs.forEach(function(el){ io.observe(el); });\n      this._io = io;\n    }\n  }\n  componentWillUnmount(){\n    clearTimeout(this._t); clearTimeout(this._revealT);\n    if(this._onScroll){\n      window.removeEventListener('scroll', this._onScroll);\n      window.removeEventListener('resize', this._onScroll);\n    }\n    if(this._io){ this._io.disconnect(); }\n  }\n  typeLoop(){\n    const word = this._words[this._wi];\n    if(!this._del){\n      this._ci++;\n      if(this._ci > word.length){\n        this._del = true;\n        this.setState({ typed: word });\n        this._t = setTimeout(() => this.typeLoop(), 1300);\n        return;\n      }\n    } else {\n      this._ci--;\n      if(this._ci < 0){\n        this._del = false; this._ci = 0;\n        this._wi = (this._wi + 1) % this._words.length;\n        this.setState({ typed: '' });\n        this._t = setTimeout(() => this.typeLoop(), 280);\n        return;\n      }\n    }\n    this.setState({ typed: word.slice(0, this._ci) });\n    this._t = setTimeout(() => this.typeLoop(), this._del ? 55 : 100);\n  }\n\n  renderVals(){\n    const active = this.state.active;\n    const typeWord = React.createElement('span', { style: { color: '#C26B4A' } },\n      this.state.typed,\n      React.createElement('span', { style: { display: 'inline-block', width: '4px', height: '0.82em', background: '#C26B4A', marginLeft: '5px', borderRadius: '1px', transform: 'translateY(2px)', animation: 'blink 1s steps(1) infinite' } })\n    );\n\n    const labels = { home: 'Home', about: 'About', experience: 'Experience', projects: 'Projects', contact: 'Contact' };\n    const navLinks = ['home', 'about', 'experience', 'projects'].map(id => ({\n      label: labels[id],\n      onClick: () => this.goSection(id),\n      col: active === id ? '#9E4B2E' : '#5F564C',\n      weight: active === id ? '600' : '500',\n      bg: active === id ? '#26211c0f' : 'transparent',\n    }));\n    const menuItems = ['home', 'about', 'experience', 'projects', 'contact'].map(id => ({\n      label: labels[id],\n      onClick: () => this.goSection(id),\n      col: active === id ? '#9E4B2E' : '#26211C',\n    }));\n\n    const recent = [\n      { year: 'May 2026 to Now', role: 'Consulting Intern, Finance Transformation', company: 'Deloitte' },\n      { year: 'Sep 2025 to Apr 2026', role: 'Finance Intern', company: 'Wealthsimple' },\n      { year: 'May 2025 to Aug 2025', role: 'Audit Intern', company: 'Deloitte' },\n    ];\n\n    const experiences = [\n      { year: 'May 2026 to Now', type: 'Internship', role: 'Consulting Intern, Finance Transformation', company: 'Deloitte', desc: 'Supporting Finance Transformation engagements, helping clients rethink processes, data, and systems to make their finance functions faster and smarter.' },\n      { year: 'Sep 2025 to Apr 2026', type: 'Internship', role: 'Finance Intern', company: 'Wealthsimple', desc: 'Worked alongside the finance team at one of Canada\\u2019s leading fintechs, getting a close-up view of how a fast-moving product company manages its numbers.' },\n      { year: 'May 2025 to Aug 2025', type: 'Internship', role: 'Audit Intern', company: 'Deloitte', desc: 'Built a foundation in financial rigor and attention to detail across audit engagements for a range of clients.' },\n      { year: 'Apr 2024 to Aug 2024', type: 'Summer Role', role: 'Summer Student', company: 'Immigration Law Firm', desc: 'Supported case work and client files, learning how to navigate detail-heavy, high-stakes processes with care.' },\n    ];\n\n    const skillGroups = [\n      { label: 'Strategy & Product', items: ['Strategy', 'Product Sense', 'Process Design'] },\n      { label: 'Analysis', items: ['Financial Modeling', 'Data Analysis', 'Excel'] },\n      { label: 'Collaboration', items: ['Stakeholder Management', 'Communication'] },\n    ];\n\n    const hobbies = [\n      { name: 'Basketball', note: 'On the court whenever I can be.' },\n      { name: 'Investing & Trading', note: 'Following markets is half hobby, half homework.' },\n      { name: 'Cooking', note: 'Always chasing the next good recipe.' },\n      { name: 'Video Games', note: 'A lifelong appreciation for great game design.' },\n      { name: 'Movies', note: 'Storytelling, on and off the screen.' },\n    ];\n\n    const projects = [\n      {\n        name: 'Dignifi',\n        role: 'Consultant',\n        period: 'Aug 2024 to May 2025',\n        context: 'A Silicon Valley startup building technology for the reentry ecosystem, connecting people leaving incarceration with the providers, programs, and resources they need to rebuild.',\n        body: 'Dignifi had a clear product vision but two open strategic questions: how big is this market, and what will providers actually pay? I co-built a bottom-up market-sizing model, triangulating California corrections release data, provider funding distributions, and national provider-density benchmarks, then developed the pricing strategy across their portfolio, grounding a revenue model in willingness-to-pay research with Bay Area service providers.',\n        stats: [\n          { v: '$67M', l: 'Market opportunity, sized bottom-up' },\n          { v: '$3–4.8K', l: 'Validated annual price point for their provider CRM' },\n        ],\n        tags: ['Market Sizing', 'Pricing Strategy', 'Revenue Modeling', 'Research'],\n      },\n      {\n        name: 'Open Gate',\n        role: 'Engagement Manager',\n        period: '2025',\n        context: 'A Bay Area non-profit that helps formerly incarcerated people move from jail into college and trade programs.',\n        body: 'Open Gate had ten years of student data but no reliable way to use it, leaving them unable to prove their impact to funders, their Board, or policymakers. I led a team of seven across three workstreams (data analysis, barriers research, and a policy-ready report) and personally built an enrollment-retention funnel mapping where participants dropped off across the education pipeline. We presented to their Board in November 2025, and the conversation ended with them exploring a second engagement.',\n        stats: [\n          { v: '98.5%', l: 'Non-recidivism rate across 195 participants' },\n          { v: '66%', l: 'Of retained enrollment driven by 3 partner institutions' },\n          { v: '7', l: 'Consultants led across 3 workstreams' },\n        ],\n        tags: ['Data Analysis', 'Team Leadership', 'Impact Measurement', 'Policy'],\n      },\n    ];\n\n    const contacts = [\n      { label: 'EMAIL', value: 'marcusreyes1027@gmail.com', note: 'Best way to reach me', href: 'mailto:marcusreyes1027@gmail.com' },\n      { label: 'LINKEDIN', value: 'in/marcusreyes', note: 'Let\\u2019s connect', href: '#' },\n      { label: 'LOCATION', value: 'Toronto, ON', note: 'Open to relocation', href: '#' },\n      { label: 'RESUME', value: 'Download PDF', note: 'The one-page version', href: '#' },\n    ];\n\n    return {\n      typeWord, navLinks, menuItems,\n      recent, experiences, skillGroups, hobbies, projects, contacts,\n      menuOpenStr: this.state.menuOpen ? 'true' : 'false',\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      logoClick: () => this.goSection('home'),\n      goExperience: () => this.goSection('experience'),\n      goContact: () => this.goSection('contact'),\n      toggleMenu: () => this.toggleMenu(),\n      closeMenu: () => this.closeMenu(),\n      submitMsg: (e) => this.submitMsg(e),\n      resetMsg: () => this.resetMsg(),\n      nameRef: (el) => { this._nameEl = el; },\n      emailRef: (el) => { this._emailEl = el; },\n      msgRef: (el) => { this._msgEl = el; },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
